server:
  port: ${PORT:8081}
  forward-headers-strategy: framework
  tomcat:
    max-http-form-post-size: 10MB

spring:
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  application:
    name: auth-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:pharmacy_auth}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${SPRING_DATASOURCE_USERNAME:${DB_USERNAME:${DB_USER:root}}}
    password: ${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:2205}}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:google-client-id-placeholder}
            client-secret: ${GOOGLE_CLIENT_SECRET:google-client-secret-placeholder}
            scope: openid,profile,email
            redirect-uri: ${GOOGLE_REDIRECT_URI:http://localhost:8089/login/oauth2/code/google}


app:
  jwt-secret: ${JWT_SECRET:pharmacy_super_secret_key_please_change}
  jwt-expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  geoapify-key: ${GEOAPIFY_KEY:0ba2a0054b5845ad8fb86a37fdadf5c5}
  oauth2:
    # Where the React app reads ?token=&userId= after a successful Google login.
    success-redirect-uri: ${FRONTEND_OAUTH_REDIRECT:http://localhost:3000/login}
    authorization-url: /oauth2/authorization/google
    callback-url: /login/oauth2/code/google

springdoc:
  swagger-ui:
    path: /swagger-ui.html
